<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia do Repositório</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --paper: #ffffff;
      --text: #142033;
      --muted: #53627b;
      --primary: #0f5eb8;
      --primary-soft: #e7f1ff;
      --border: #d8e1ee;
      --shadow: 0 18px 38px rgba(15, 31, 53, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 10% -10%, #c7e2ff 0%, transparent 42%),
        radial-gradient(circle at 100% 0%, #ffd8b4 0%, transparent 36%),
        var(--bg);
      color: var(--text);
      padding: 28px 16px 42px;
      min-height: 100vh;
      background-repeat: no-repeat;
      background-size: 100% 100%;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    header {
      padding: 24px;
      background: linear-gradient(135deg, #f7fbff 0%, #fff7ee 100%);
      border-bottom: 1px solid var(--border);
    }

    .topbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    .btn {
      text-decoration: none;
      color: var(--primary);
      background: var(--primary-soft);
      border: 1px solid #cde2ff;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    h1 { font-size: 1.65rem; margin-bottom: 6px; }
    .subtitle { color: var(--muted); line-height: 1.55; }

    .content {
      padding: 20px 24px 28px;
      line-height: 1.7;
      color: #334155;
    }

    .content h1, .content h2, .content h3 { color: #0f172a; margin: 18px 0 8px; }
    .content h1 { font-size: 1.45rem; }
    .content h2 { font-size: 1.2rem; }
    .content p { margin: 8px 0; }
    .content ul, .content ol { margin: 8px 0; padding-left: 20px; }
    .content li { margin: 4px 0; }
    .content a { color: #0f5eb8; }

    .content pre {
      position: relative;
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 10px;
      overflow: hidden;
      margin: 12px 0;
    }

    .code-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
      padding: 8px 10px;
      background: #111827;
    }

    .code-language { color: #cbd5e1; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }

    .copy-code-btn {
      border: 1px solid #334155;
      background: #0b1220;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }

    .copy-code-btn.copied {
      background: #14532d;
      border-color: #166534;
      color: #dcfce7;
    }

    .content pre code {
      display: block;
      padding: 14px 16px;
      color: #e2e8f0;
      background: #0f172a;
      overflow: auto;
      line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .hljs-keyword { color: #c084fc; font-weight: 700; }
    .hljs-string { color: #86efac; }
    .hljs-number { color: #fbbf24; }
    .hljs-title { color: #67e8f9; }
    .hljs-tag { color: #fda4af; }
    .hljs-name { color: #93c5fd; }
    .hljs-attr, .hljs-attribute { color: #fdba74; }
    .hljs-comment { color: #94a3b8; font-style: italic; }

    .content blockquote {
      margin: 12px 0;
      padding: 12px 16px;
      border-left: 4px solid #6366f1;
      background: #eef2ff;
      color: #4b5563;
    }

    .content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .content th, .content td { border: 1px solid #e5e7eb; padding: 10px 12px; text-align: left; }

    .status { margin-top: 12px; color: #64748b; font-size: 0.86rem; }

    @media (max-width: 720px) {
      header, .content { padding-left: 16px; padding-right: 16px; }
      h1 { font-size: 1.45rem; }
    }
  </style>
</head>
<body data-source="README.md" data-title="Guia do Repositório" data-subtitle="Versão HTML do README principal do curso.">
  <main class="container">
    <header>
      <div class="topbar">
        <a class="btn" href="./index.html">← Voltar para início</a>
        <a class="btn" href="./README.md">Abrir Markdown</a>
      </div>
      <h1 id="page-title">Guia do Repositório</h1>
      <p class="subtitle" id="page-subtitle">Versão HTML do README principal do curso.</p>
    </header>

    <section class="content" id="content">
      <p>Carregando conteúdo...</p>
      <div class="status" id="status"></div>
    </section>
  </main>

  <script src="./assets/vendor/marked.min.js"></script>
  <script src="./assets/vendor/highlight.common.min.js"></script>
  <script>
    const contentEl = document.getElementById('content');
    const statusEl = document.getElementById('status');
    const source = document.body.dataset.source;
    const pageTitle = document.getElementById("page-title");
    const pageSubtitle = document.getElementById("page-subtitle");

    if (pageTitle && document.body.dataset.title) {
      pageTitle.textContent = document.body.dataset.title;
      document.title = document.body.dataset.title;
    }
    if (pageSubtitle && document.body.dataset.subtitle) {
      pageSubtitle.textContent = document.body.dataset.subtitle;
    }

    const hasMarked = typeof window.marked !== 'undefined' && typeof window.marked.parse === 'function';

    if (hasMarked) {
      marked.setOptions({ gfm: true, breaks: false });
    }

    const escapeHtml = (value) =>
      value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    const copyText = async (text) => {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.setAttribute('readonly', '');
      textArea.style.position = 'fixed';
      textArea.style.opacity = '0';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();
      document.execCommand('copy');
      document.body.removeChild(textArea);
    };

    const getLanguage = (codeEl) => {
      const cls = Array.from(codeEl.classList).find((name) => name.startsWith('language-'));
      if (!cls) return 'texto';
      const raw = cls.replace('language-', '').toLowerCase();
      if (raw === 'html') return 'xml';
      return raw;
    };

    const enhanceCodeBlocks = () => {
      const blocks = Array.from(contentEl.querySelectorAll('pre > code'));
      blocks.forEach((codeEl) => {
        const preEl = codeEl.parentElement;
        if (!preEl || preEl.classList.contains('code-ready')) return;
        preEl.classList.add('code-ready');

        const toolbar = document.createElement('div');
        toolbar.className = 'code-toolbar';

        const lang = document.createElement('span');
        lang.className = 'code-language';
        const language = getLanguage(codeEl);
        lang.textContent = language;

        const btn = document.createElement('button');
        btn.className = 'copy-code-btn';
        btn.type = 'button';
        btn.textContent = 'Copiar';
        btn.addEventListener('click', async () => {
          const old = btn.textContent;
          try {
            await copyText(codeEl.textContent || '');
            btn.textContent = 'Copiado!';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = old;
              btn.classList.remove('copied');
            }, 1500);
          } catch {
            btn.textContent = old;
          }
        });

        toolbar.appendChild(lang);
        toolbar.appendChild(btn);
        preEl.insertBefore(toolbar, codeEl);

        if (window.hljs) {
          codeEl.classList.add(`language-${language}`);
          hljs.highlightElement(codeEl);
        }
      });
    };

    fetch(source)
      .then((res) => {
        if (!res.ok) throw new Error(`Falha ao carregar ${source} (HTTP ${res.status})`);
        return res.text();
      })
      .then((md) => {
        contentEl.innerHTML = hasMarked ? marked.parse(md) : `<pre><code>${escapeHtml(md)}</code></pre>`;
        statusEl.textContent = `Fonte: ${source}`;
        enhanceCodeBlocks();
      })
      .catch((err) => {
        contentEl.innerHTML = '<p>Não foi possível carregar o conteúdo.</p>';
        statusEl.textContent = err.message;
      });
  </script>
</body>
</html>
